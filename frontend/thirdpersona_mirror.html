<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ThirdPersona — The Mirror</title>
<meta name="description" content="The camera sees you. You become the figure. Nothing leaves your device." />
<style>
  :root {
    --ink: #EDF2F7; --ink2: #9AA6B5; --ink3: #5A6472; --ink4: #39414D;
    --gold: #C9A96E; --gold-b: #E3B564;
    --serif: Georgia, "Iowan Old Style", "Times New Roman", serif;
    --sans: "Inter", -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body { background: radial-gradient(1100px 700px at 50% -5%, rgba(18,24,48,0.9), transparent 60%), #05070C;
    color: var(--ink); font-family: var(--sans); overflow: hidden; }
  #gl { position: fixed; inset: 0; width: 100%; height: 100vh; z-index: 1; }
  .vignette { position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(120% 90% at 50% 45%, transparent 55%, rgba(2,3,6,0.78) 100%); }
  .brand { position: fixed; top: 26px; left: 0; right: 0; text-align: center; z-index: 5;
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 600; }
  h1 { position: fixed; top: 9vh; left: 0; right: 0; text-align: center; z-index: 5; pointer-events: none;
    font-family: var(--serif); font-weight: 500; font-size: clamp(28px, 4.2vw, 46px);
    background: linear-gradient(135deg, #EDF2F7 30%, #E3B564 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

  #ui { position: fixed; inset: 0; z-index: 5; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; padding-bottom: 7vh; pointer-events: none; }
  #ui > * { pointer-events: auto; }
  #caption { min-height: 50px; max-width: 560px; text-align: center; margin-bottom: 4px;
    font-family: var(--serif); font-size: 17px; line-height: 1.7; color: #DAE2EC; opacity: 0.5; padding: 0 22px; }
  #prompt { font-size: 15px; color: var(--ink2); margin-bottom: 18px; transition: opacity .4s; }

  #scan { padding: 15px 40px; border-radius: 12px; cursor: pointer;
    font: 700 14px var(--sans); color: #0A0C12; border: none;
    background: linear-gradient(135deg, var(--gold-b), var(--gold));
    box-shadow: 0 8px 44px rgba(201,169,110,0.35); }
  .whisper { font-size: 11px; color: var(--ink4); margin-top: 12px; text-align: center; }

  #voiceui { display: none; flex-direction: column; align-items: center; }
  #mic { width: 78px; height: 78px; border-radius: 50%; cursor: pointer;
    background: radial-gradient(circle at 35% 30%, rgba(227,181,100,0.18), rgba(14,18,25,0.85));
    border: 1px solid rgba(201,169,110,0.4); color: var(--gold-b);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 44px rgba(201,169,110,0.18); transition: box-shadow .3s, transform .15s; }
  #mic:hover { transform: scale(1.05); }
  #mic.live { box-shadow: 0 0 70px rgba(227,181,100,0.45); }
  #mic svg { width: 28px; height: 28px; }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="vignette"></div>
<div class="brand">ThirdPersona</div>
<h1>This is you. Live.</h1>

<div id="ui">
  <div id="caption"></div>
  <div id="prompt"></div>
  <button id="scan">Let it see you</button>
  <div id="voiceui">
    <button id="mic" aria-label="Speak">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <rect x="9" y="3" width="6" height="11" rx="3"/>
        <path d="M5 11a7 7 0 0 0 14 0"/>
        <line x1="12" y1="18" x2="12" y2="21"/>
      </svg>
    </button>
  </div>
  <div class="whisper">Your face never leaves this page. There is no upload. There is no server.</div>
</div>
