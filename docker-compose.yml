services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thirdpersona
      POSTGRES_USER: thirdpersona
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thirdpersona"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
